<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ملف الشركة - EduPlatform</title>

    
    <link rel="stylesheet" href="assets/css/bootstrap.min.css">
        <link rel="stylesheet" href="assets/css/profile.css">
        <link rel="stylesheet" href="assets/css/theme.css">
</head>

<body>

    <div id="navbar"></div>

    <div class="container py-5">

        <!-- Company Info -->
        <div class="card shadow-sm mb-4">
            <div class="card-body text-center">

                <img id="companyLogo" class="profile-img mb-3" src="assets/img/company.png" alt="Company">

                <h3 id="companyName" class="fw-bold"></h3>
                <p id="companyEmail" class="text-muted"></p>
                <p id="companyIndustry" class="text-primary fw-bold"></p>

                <div class="d-flex justify-content-center gap-4 mt-3">
                    <span class="badge bg-success p-2">الوظائف: <span id="jobsCount"></span></span>
                    <span class="badge bg-info p-2">المتقدمون: <span id="applicantsCount"></span></span>
                </div>

            </div>
        </div>

        <!-- Bio -->
        <div class="card shadow-sm mb-4">
            <div class="card-body">
                <h4 class="fw-bold mb-3">نبذة عن الشركة</h4>
                <p id="companyBio"></p>
            </div>
        </div>

        <!-- Jobs -->
        <div class="card shadow-sm">
            <div class="card-body">
                <h4 class="fw-bold mb-3">وظائف الشركة</h4>

                <div id="companyJobs" class="row">
                    <!-- سيتم تحميل الوظائف هنا -->
                </div>
            </div>
        </div>

    </div>

    <div id="footer"></div>

  
     <script src="assets/js/bootstrap.bundle.min.js"></script>
     <script src="assets/js/bootstrap.min.js"></script>    <script src="assets/js/main.js"></script>
    <script src="assets/js/company-profile.js"></script>

</body>
</html>

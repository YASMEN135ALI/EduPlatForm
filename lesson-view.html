<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>عرض الدرس - EduPlatform</title>

    <link rel="stylesheet" href="assets/css/bootstrap.min.css">
        <link rel="stylesheet" href="assets/css/lesson.css">
          <link rel="stylesheet" href="assets/css/theme.css">
</head>

<body>

    <div id="navbar"></div>

    <div class="container py-5">

        <h2 id="lessonTitle" class="fw-bold mb-4 text-center"></h2>

        <!-- Video Section -->
        <div class="card shadow-sm mb-4">
            <div class="card-body text-center">
                <iframe id="lessonVideo" width="100%" height="450" class="rounded"
                    src="" frameborder="0" allowfullscreen></iframe>
            </div>
        </div>

        <!-- Description -->
        <div class="card shadow-sm mb-4">
            <div class="card-body">
                <h4 class="fw-bold mb-3">وصف الدرس</h4>
                <p id="lessonDescription"></p>
            </div>
        </div>

        <!-- Navigation -->
        <div class="d-flex justify-content-between">
            <button id="prevLesson" class="btn btn-secondary">الدرس السابق</button>
            <button id="nextLesson" class="btn btn-primary">الدرس التالي</button>
        </div>

    </div>

    <div id="footer"></div>

     
     <script src="assets/js/bootstrap.bundle.min.js"></script>
     <script src="assets/js/bootstrap.min.js"></script>
    <script src="assets/js/main.js"></script>
    <script src="assets/js/lesson-view.js"></script>

</body>
</html>

<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تعديل الوظيفة - EduPlatform</title>

    <link rel="stylesheet" href="assets/css/bootstrap.min.css">
        <link rel="stylesheet" href="assets/css/forms.css">
          <link rel="stylesheet" href="assets/css/theme.css">
</head>

<body>

    <div id="navbar"></div>

    <div class="login-container">
        <div class="login-box shadow">

            <h2 class="text-center mb-4 fw-bold">تعديل الوظيفة</h2>

            <form id="editJobForm">

                <div class="mb-3">
                    <label class="form-label">عنوان الوظيفة</label>
                    <input type="text" id="jobTitle" class="form-control">
                </div>

                <div class="mb-3">
                    <label class="form-label">نوع الوظيفة</label>
                    <select id="jobType" class="form-select">
                        <option value="full-time">دوام كامل</option>
                        <option value="part-time">دوام جزئي</option>
                        <option value="remote">عن بُعد</option>
                        <option value="internship">تدريب</option>
                    </select>
                </div>

                <div class="mb-3">
                    <label class="form-label">الوصف</label>
                    <textarea id="jobDescription" class="form-control" rows="4"></textarea>
                </div>

                <div class="mb-3">
                    <label class="form-label">المتطلبات</label>
                    <textarea id="jobRequirements" class="form-control" rows="4"></textarea>
                </div>

                <button type="submit" class="btn btn-warning w-100 mt-3">حفظ التعديلات</button>

                <div id="errorMsg" class="alert alert-danger text-center d-none mt-3"></div>
                <div id="successMsg" class="alert alert-success text-center d-none mt-3"></div>

            </form>
        </div>
    </div>

    <div id="footer"></div>

  
     <script src="assets/js/bootstrap.bundle.min.js"></script>
     <script src="assets/js/bootstrap.min.js"></script>
         <script src="assets/js/main.js"></script>
    <script src="assets/js/edit-job.js"></script>

</body>
</html>

<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تعديل الكورس - EduPlatform</title>

    <link rel="stylesheet" href="assets/css/bootstrap.min.css">
        <link rel="stylesheet" href="assets/css/forms.css">
          <link rel="stylesheet" href="assets/css/theme.css">
</head>

<body>

    <div id="navbar"></div>

    <div class="login-container">
        <div class="login-box shadow">

            <h2 class="text-center mb-4 fw-bold">تعديل الكورس</h2>

            <form id="editCourseForm">

                <div class="mb-3">
                    <label class="form-label">عنوان الكورس</label>
                    <input type="text" id="courseTitle" class="form-control">
                </div>

                <div class="mb-3">
                    <label class="form-label">الوصف</label>
                    <textarea id="courseDescription" class="form-control" rows="4"></textarea>
                </div>

                <div class="mb-3">
                    <label class="form-label">التصنيف</label>
                    <select id="courseCategory" class="form-select">
                        <option value="programming">برمجة</option>
                        <option value="design">تصميم</option>
                        <option value="ai">ذكاء اصطناعي</option>
                        <option value="business">أعمال</option>
                    </select>
                </div>

                <div class="mb-3">
                    <label class="form-label">مستوى الصعوبة</label>
                    <select id="courseLevel" class="form-select">
                        <option value="beginner">مبتدئ</option>
                        <option value="intermediate">متوسط</option>
                        <option value="advanced">متقدم</option>
                    </select>
                </div>

                <div class="mb-3">
                    <label class="form-label">تغيير صورة الكورس (اختياري)</label>
                    <input type="file" id="courseImage" class="form-control">
                </div>

                <button type="submit" class="btn btn-warning w-100 mt-3">حفظ التعديلات</button>

                <div id="errorMsg" class="alert alert-danger text-center d-none mt-3"></div>
                <div id="successMsg" class="alert alert-success text-center d-none mt-3"></div>

            </form>
        </div>
    </div>

    <div id="footer"></div>

  
     <script src="assets/js/bootstrap.bundle.min.js"></script>
     <script src="assets/js/bootstrap.min.js"></script>    <script src="assets/js/main.js"></script>
    <script src="assets/js/edit-course.js"></script>

</body>
</html>

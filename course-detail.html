<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تفاصيل الكورس - EduPlatform</title>


    <link rel="stylesheet" href="assets/css/bootstrap.min.css">
    <link rel="stylesheet" href="assets/css/style.css">
    <link rel="stylesheet" href="assets/css/theme.css">
</head>

<body>

    <div id="navbar"></div>
    <section class="mt-5">
        <div class="container py-5">

            <!-- Course Header -->
            <div class="card shadow-sm mb-4">
                <div class="card-body">
                    <h2 id="courseTitle" class="fw-bold"></h2>
                    <p id="courseDescription" class="text-muted"></p>

                    <div class="d-flex justify-content-between mt-4">
                        <div>
                            <strong>المدرّس:</strong>
                            <span id="courseTeacher"></span>
                        </div>

                        <div>
                            <strong>عدد الدروس:</strong>
                            <span id="lessonCount"></span>
                        </div>
                    </div>

                    <button id="enrollBtn" class="btn btn-primary w-100 mt-4">
                        التسجيل في الكورس
                    </button>
                </div>
            </div>

            <!-- Lessons List -->
            <h4 class="fw-bold mb-3">محتوى الكورس</h4>
            <div id="lessonsContainer" class="list-group shadow-sm">
                <!-- سيتم تحميل الدروس هنا -->
            </div>

        </div>
    </section>

    <div id="footer"></div>


    <script src="assets/js/bootstrap.bundle.min.js"></script>
    <script src="assets/js/bootstrap.min.js"></script>
    <script src="assets/js/main.js"></script>
    <script src="assets/js/course-detail.js"></script>

</body>

</html>

<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة الشركة - EduPlatform</title>

     <link rel="stylesheet" href="assets/css/bootstrap.min.css">
        <link rel="stylesheet" href="assets/css/theme.css">
         <link rel="stylesheet" href="assets/css/dashboard.css">
</head>

<body>

    <div id="navbar"></div>

    <div class="container py-5">

        <h2 class="fw-bold mb-4 text-center">لوحة تحكم الشركة</h2>

        <!-- Stats Section -->
        <div class="row mb-4">
            <div class="col-md-4">
                <div class="card shadow-sm text-center p-3">
                    <h4 class="fw-bold">عدد الوظائف</h4>
                    <p id="jobsCount" class="display-6">0</p>
                </div>
            </div>

            <div class="col-md-4">
                <div class="card shadow-sm text-center p-3">
                    <h4 class="fw-bold">عدد المتقدمين</h4>
                    <p id="applicantsCount" class="display-6">0</p>
                </div>
            </div>

            <div class="col-md-4">
                <div class="card shadow-sm text-center p-3">
                    <h4 class="fw-bold">وظائف نشطة</h4>
                    <p id="activeJobsCount" class="display-6">0</p>
                </div>
            </div>
        </div>

        <!-- Add Job Button -->
        <div class="text-end mb-3">
            <a href="create-job.html" class="btn btn-success">إضافة وظيفة جديدة</a>
        </div>

        <!-- Jobs Table -->
        <div class="card shadow-sm">
            <div class="card-body">
                <h4 class="fw-bold mb-3">الوظائف المنشورة</h4>

                <table class="table table-bordered text-center">
                    <thead class="table-dark">
                        <tr>
                            <th>العنوان</th>
                            <th>النوع</th>
                            <th>عدد المتقدمين</th>
                            <th>إجراءات</th>
                        </tr>
                    </thead>
                    <tbody id="jobsTable">
                        <!-- سيتم تحميل الوظائف هنا -->
                    </tbody>
                </table>
            </div>
        </div>

    </div>

    <div id="footer"></div>

  
     <script src="assets/js/bootstrap.bundle.min.js"></script>
     <script src="assets/js/bootstrap.min.js"></script>    <script src="assets/js/main.js"></script>
    <script src="assets/js/dashboard-company.js"></script>

</body>
</html>
